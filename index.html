<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guess The Place</title>

<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    height: 100vh;
    overflow: hidden;
    color: white;
}

/* BACKGROUND */
.background {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('images/lapuyan.jpg.png') no-repeat center/cover;
    z-index: -2;
}

/* OVERLAY */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: -1;
}

/* CENTER */
.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

/* TITLE */
.title {
    font-family: 'Bangers', cursive;
    font-size: 55px;
    letter-spacing: 3px;
    text-shadow: 
        3px 3px 0 #ff6a00,
        6px 6px 0 #000;
}

/* SUBTITLE */
.subtitle {
    margin-bottom: 30px;
    opacity: 0.8;
}

/* MENU */
.menu {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.menu button {
    padding: 15px;
    border-radius: 15px;
    border: none;
    cursor: pointer;
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

/* COLORS */
.play { background: linear-gradient(45deg,#ff6a00,#ee0979); grid-column: span 2; }
.settings { background: #3498db; }
.history { background: #9b59b6; }
.about { background: #2ecc71; }
.score { background: #f1c40f; color: black; }

.menu button:hover {
    transform: scale(1.08);
}
</style>

</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="container">

    <div class="title">GUESS THE PLACE</div>
    <div class="subtitle">Lapuyan Edition 🌴</div>

    <div class="menu">
        <button class="play" onclick="play()">▶ PLAY</button>
        <button class="settings" onclick="settings()">⚙ Settings</button>
        <button class="history" onclick="history()">📜 History</button>
        <button class="about" onclick="about()">ℹ About</button>
        <button class="score" onclick="score()">🏆 Score</button>
    </div>

</div>

<script>

// PLAY
function play(){
    window.location.href = "levels.html";
}

// SETTINGS (FIXED 🔥)
function settings(){
    window.location.href = "settings.html";
}

// HISTORY (FIXED 🔥)
function history(){
    window.location.href = "history.html";
}


function about(){
    window.location.href = "about.html";
}

// HIGH SCORE (FIXED 🔥)
function score(){
    window.location.href = "score.html";
}

</script>

</body>
</html>
