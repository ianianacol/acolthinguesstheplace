<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* BOX */
.container {
    background: rgba(0,0,0,0.5);
    padding: 25px;
    border-radius: 20px;
    width: 320px;
    text-align: center;
}

/* TITLE */
h2 {
    margin-bottom: 10px;
}

/* TEXT */
p {
    font-size: 14px;
    line-height: 1.5;
}

/* BUTTON */
button {
    margin-top: 15px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="container">

    <h2>🌍 About Game</h2>

    <p>
    <b>Guess The Place - Lapuyan Edition</b><br><br>
    This game challenges you to identify different places based on images.<br><br>

    🎯 Answer correctly to earn coins<br>
    ⏱ Beat the timer before time runs out<br>
    ⭐ Level up as you progress<br><br>

    Designed for fun and learning geography! 🌍
    </p>

    <button onclick="goBack()">⬅ Back</button>

</div>

<script>
function goBack(){
    window.location.href = "index.html";
}
</script>

</body>
</html>
